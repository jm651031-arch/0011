<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中華健言社100期會外會 報名</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    background:#fff7ef;
    color:#333;
}

.container{
    max-width:480px;
    margin:20px auto;
    padding:18px;
}

.card{
    background:#fff;
    border-radius:18px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
    overflow:hidden;
}

.header{
    background:linear-gradient(135deg,#ff9800,#ffb74d);
    color:white;
    padding:24px 20px;
    text-align:center;
}

.header h1{
    font-size:26px;
    margin-bottom:10px;
}

.header p{
    line-height:1.8;
    font-size:15px;
}

.form{
    padding:22px;
}

label{
    display:block;
    margin-top:16px;
    margin-bottom:6px;
    font-weight:bold;
    color:#ef6c00;
}

input,select{
    width:100%;
    padding:13px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
    outline:none;
    transition:.3s;
}

input:focus,
select:focus{
    border-color:#ff9800;
    box-shadow:0 0 8px rgba(255,152,0,.3);
}

.note{
    color:#777;
    font-size:13px;
    margin-top:5px;
}

.radio-group{
    display:flex;
    gap:20px;
    margin-top:8px;
}

.radio-group label{
    display:flex;
    align-items:center;
    gap:6px;
    color:#333;
    font-weight:normal;
    margin:0;
}

.radio-group input{
    width:auto;
}

button{
    width:100%;
    margin-top:28px;
    padding:15px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#f57c00;
}

button:disabled{
    background:#bbb;
    cursor:not-allowed;
}

#msg{
    margin-top:18px;
    text-align:center;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<div class="card">

<div class="header">
<h1>🎉 中華健言社100期會外會</h1>

<p>
📅 2026/10/10（六）09:00–16:00
</p>

<p>
📍 新城風糖休閒園區
</p>

<p>
💰 會員550元／非會員700元（含保險）
</p>

</div>

<div class="form">

<form id="signupForm">

<label>姓名</label>
<input type="text" id="name" required>

<label>手機</label>
<input
type="tel"
id="phone"
maxlength="10"
pattern="09[0-9]{8}"
placeholder="09xxxxxxxx"
required>

<label>身分證字號</label>
<input
type="text"
id="id"
maxlength="10"
placeholder="A123456789"
required>

<div class="note">
※ 僅供保險投保使用
</div>

<label>所屬社團</label>

<select id="club" required>
<option value="">請選擇</option>
<option>諄言社</option>
<option>三重社</option>
<option>三峽社</option>
<option>鶯歌社</option>
<option>竹北社</option>
<option>新竹社</option>
<option>中壢社</option>
<option>湖口社</option>
</select>

<label>餐點</label>

<div class="radio-group">

<label>
<input type="radio" name="meal" value="葷食" checked>
葷食
</label>

<label>
<input type="radio" name="meal" value="素食">
素食
</label>

</div>

<button id="submitBtn" type="submit">
送出報名
</button>

<div id="msg"></div>

</form>

</div>

</div>

</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbwR_ksLUnWWpEWdUgcCxqoLVtxMaeAXv8qObYmZoICZDxxPLNbugmpVfmIjC8OiDvyT/exec";

document.getElementById("signupForm").addEventListener("submit",async function(e){

    e.preventDefault();

    const btn=document.getElementById("submitBtn");
    const msg=document.getElementById("msg");

    btn.disabled=true;
    btn.innerText="送出中...";
    msg.innerHTML="";

    const data={
        name:document.getElementById("name").value.trim(),
        phone:document.getElementById("phone").value.trim(),
        id:document.getElementById("id").value.trim(),
        club:document.getElementById("club").value,
        meal:document.querySelector("input[name='meal']:checked").value
    };

    try{

        const res=await fetch(GAS_URL,{
            method:"POST",
            headers:{
                "Content-Type":"text/plain;charset=utf-8"
            },
            body:JSON.stringify(data)
        });

        const result=await res.json();

        if(result.success){

            msg.style.color="green";
            msg.innerHTML="✅ 報名成功！";

            document.getElementById("signupForm").reset();

        }else{

            msg.style.color="red";
            msg.innerHTML="❌ "+result.message;

        }

    }catch(err){

        msg.style.color="red";
        msg.innerHTML="❌ 無法連線，請稍後再試";

    }

    btn.disabled=false;
    btn.innerText="送出報名";

});

</script>

</body>
</html>
