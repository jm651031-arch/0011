<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中華健言社100期會外會｜活動報名</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Noto Sans TC",sans-serif;
}

body{
    background:#fff7ef;
    color:#444;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.header{
    background:linear-gradient(135deg,#ff9800,#ffb74d);
    color:#fff;
    text-align:center;
    padding:35px 25px;
}

.header h1{
    font-size:28px;
    margin-bottom:10px;
}

.header h2{
    font-size:20px;
    font-weight:500;
}

.info{
    padding:22px;
    background:#fffaf5;
    border-bottom:1px solid #eee;
    line-height:1.9;
}

.info strong{
    color:#ef6c00;
}

form{
    padding:25px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:700;
    color:#e67e22;
}

input,
select{
    width:100%;
    padding:14px;
    border:2px solid #ffd7a5;
    border-radius:10px;
    font-size:16px;
    transition:.25s;
}

input:focus,
select:focus{
    outline:none;
    border-color:#ff9800;
    box-shadow:0 0 8px rgba(255,152,0,.2);
}

.note{
    font-size:13px;
    color:#777;
    margin-top:6px;
}

.radio-group{
    display:flex;
    gap:18px;
    margin-top:5px;
}

.radio-group label{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:500;
    color:#444;
}

.radio-group input{
    width:auto;
}

button{
    width:100%;
    border:none;
    background:#ff9800;
    color:white;
    padding:16px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#f57c00;
}

.footer{
    text-align:center;
    padding:18px;
    font-size:13px;
    color:#999;
}

@media(max-width:480px){

.header h1{
    font-size:24px;
}

.header h2{
    font-size:18px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🎉 中華健言社</h1>
<h2>100 期會外會活動報名</h2>
</div>

<div class="info">
<div><strong>📅 日期：</strong>2026／10／10（六）09:00–16:00</div>
<div><strong>📍 地點：</strong>新城風糖休閒園區</div>
<div><strong>💰 費用：</strong>會員 550 元／非會員 700 元（含保險）</div>
</div>

<form>

<div class="form-group">
<label>姓名</label>
<input type="text" placeholder="請輸入姓名" required>
</div>

<div class="form-group">
<label>手機</label>
<input type="tel" placeholder="09xxxxxxxx" required>
</div>

<div class="form-group">
<label>身分證字號</label>
<input type="text" placeholder="請輸入身分證字號" required>
<div class="note">※ 僅供保險投保使用</div>
</div>

<div class="form-group">
<label>所屬社團</label>
<select required>
<option value="">請選擇社團</option>
<option>諄言社</option>
<option>三重社</option>
<option>三峽社</option>
<option>鶯歌社</option>
<option>竹北社</option>
<option>新竹社</option>
<option>中壢社</option>
<option>湖口社</option>
</select>
</div>

<div class="form-group">
<label>餐點</label>

<div class="radio-group">

<label>
<input type="radio" name="meal" value="葷食" checked>
葷食
</label>

<label>
<input type="radio" name="meal" value="素食">
素食
</label>

</div>

</div>

<button type="submit">立即報名</button>

</form>

<div class="footer">
中華健言社 100 期會外會｜期待您的參與
</div>

</div>

</body>
</html>
